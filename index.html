<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>The LAST Shell - TP Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border: 4px solid #400; }
        .btn { background: #600; border: 2px solid #f00; color: white; padding: 20px 80px; cursor: pointer; font-size: 30px; font-weight: bold; transition: 0.2s; margin: 20px; }
        .btn:hover { background: #f00; box-shadow: 0 0 30px #f00; }
        
        .tp-toggle { color: #aaa; font-size: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .tp-toggle input { width: 25px; height: 25px; }

        #ui { position: absolute; top: 20px; left: 20px; color: #f00; font-size: 14px; z-index: 10; display: none; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #444; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid lime; transform: translate(-50%, -50%); display: none; z-index: 10; border-radius: 50%; }
        #jumpscare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 200; justify-content: center; align-items: center; font-size: 200px; }

        /* Елементи ТР */
        #joystick-zone { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,0,0,0.3); border-radius: 50%; display: none; z-index: 50; pointer-events: none; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,0,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        #fire-btn { position: absolute; bottom: 60px; right: 60px; width: 110px; height: 110px; background: rgba(255,0,0,0.6); border: 4px solid white; border-radius: 50%; display: none; z-index: 60; color: white; font-weight: bold; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; text-shadow: 0 0 5px black; }
    </style>
</head>
<body>

<div id="ui">
    X: <span id="posX">0</span> | Z: <span id="posZ">0</span> | ДИСТАНЦІЯ: <span id="dist">--</span>м<br>
    <span style="color:gold;">ЦІЛЬ: ЗОЛОТИЙ СТВОЛ (45, 45)</span>
</div>
<div id="crosshair"></div>

<div id="menu">
    <h1 style="color: red; font-size: 50px; text-shadow: 0 0 20px red; margin-bottom: 20px;">The LAST Shell</h1>
    <label class="tp-toggle">
        <input type="checkbox" id="tpCheck"> ТЕЛЕФОННИЙ РЕЖИМ (ТР)
    </label>
    <button class="btn" onclick="startGame()">PLAY</button>
</div>

<div id="joystick-zone"><div id="joystick-stick"></div></div>
<div id="fire-btn">SHOOT</div>
<div id="jumpscare">💀</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, monster, shotgunItem, gunMesh, walls = [];
    let isStarted = false, hasGun = false, isDead = false, isTP = false;
    const keys = {};

    // Керування ТР
    let joyActive = false, joyStart = {x:0, y:0}, joyMove = {x:0, y:0};
    let lookActive = false, lastLook = {x:0, y:0};

    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    function playFartSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.7);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.7);
    }

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 22);
        camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.1, 0); 
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.SpotLight(0xffffff, 800, 45, Math.PI/6, 0.3, 1);
        const target = new THREE.Object3D();
        target.position.set(0, 0, -5);
        camera.add(target); camera.add(light);
        light.target = target; scene.add(camera);
        scene.add(new THREE.AmbientLight(0x050505));

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        for (let x = -30; x < 30; x++) {
            for (let z = -30; z < 30; z++) {
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(5,5), new THREE.MeshStandardMaterial({color:0x050505}));
                floor.rotation.x = -Math.PI/2; floor.position.set(x*5,0,z*5); scene.add(floor);
                if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
                if (Math.random() > 0.7) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(5, 12, 5), wallMat);
                    w.position.set(x*5, 6, z*5); scene.add(w);
                    walls.push(new THREE.Box3().setFromObject(w));
                }
            }
        }

        shotgunItem = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xffd700}));
        shotgunItem.position.set(45, 0.5, 45); scene.add(shotgunItem);

        gunMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8), new THREE.MeshStandardMaterial({color:0x222222}));
        gunMesh.rotation.x = Math.PI/2; gunMesh.position.set(0.35, -0.4, -0.6);
        camera.add(gunMesh); gunMesh.visible = false;

        monster = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 2, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xaa0000, emissiveIntensity: 2 }));
        monster.position.set(-110, 1.5, -110);
        scene.add(monster);

        // --- ЛОГІКА ТР (МИШКА І ТАЧ) ---
        const handleStart = (x, y) => {
            if(!isStarted || isDead) return;
            if(x < window.innerWidth / 2) {
                joyActive = true;
                joyStart = {x, y};
                const jz = document.getElementById('joystick-zone');
                jz.style.display = 'block';
                jz.style.left = (x - 60) + 'px';
                jz.style.top = (y - 60) + 'px';
            } else {
                lookActive = true;
                lastLook = {x, y};
            }
        };

        const handleMove = (x, y) => {
            if(joyActive) {
                let dx = x - joyStart.x;
                let dy = y - joyStart.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 45) { dx *= 45/dist; dy *= 45/dist; }
                document.getElementById('joystick-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joyMove = {x: dx/45, y: dy/45};
            }
            if(lookActive) {
                const dx = (x - lastLook.x) * 0.005;
                const dy = (y - lastLook.y) * 0.005;
                camera.rotation.y -= dx;
                camera.rotation.x -= dy;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
                lastLook = {x, y};
            }
        };

        const handleEnd = () => {
            joyActive = false; lookActive = false;
            joyMove = {x:0, y:0};
            document.getElementById('joystick-zone').style.display = 'none';
        };

        // Події мишки (для ТР)
        window.addEventListener('mousedown', (e) => { if(isTP) handleStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { 
            if(isTP) handleMove(e.clientX, e.clientY); 
            else if(isStarted && !isDead) { // Звичайний огляд ПК
                camera.rotation.y -= e.movementX * 0.0022;
                camera.rotation.x -= e.movementY * 0.0022;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
            }
        });
        window.addEventListener('mouseup', handleEnd);

        // Події тач (справжній телефон)
        window.addEventListener('touchstart', (e) => { handleStart(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('touchend', handleEnd);

        // Стрільба
        const shoot = () => {
            if (!hasGun || isDead) return;
            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            ray.set(camera.position, dir);
            if (ray.intersectObject(monster).length > 0) {
                isDead = true;
                window.location.href = "https://scratch.mit.edu/projects/1297429937/";
            }
        };
        document.getElementById('fire-btn').addEventListener('mousedown', (e) => { e.stopPropagation(); shoot(); });
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); shoot(); });
        window.addEventListener('click', () => { if(!isTP && hasGun && isStarted) shoot(); });
    }

    window.startGame = () => {
        isTP = document.getElementById('tpCheck').checked;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        if(!isTP) document.body.requestPointerLock();
        init();
        isStarted = true;
        animate();
    };

    function animate() {
        if (isDead) return;
        requestAnimationFrame(animate);

        const moveSpeed = 0.18;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
        const side = new THREE.Vector3(-dir.z, 0, dir.x);
        const oldPos = camera.position.clone();

        // Клавіатура
        if (keys['KeyW']) camera.position.addScaledVector(dir, moveSpeed);
        if (keys['KeyS']) camera.position.addScaledVector(dir, -moveSpeed);
        if (keys['KeyA']) camera.position.addScaledVector(side, -moveSpeed);
        if (keys['KeyD']) camera.position.addScaledVector(side, moveSpeed);

        // Джойстик (ТР)
        if (joyActive) {
            camera.position.addScaledVector(dir, -joyMove.y * moveSpeed);
            camera.position.addScaledVector(side, joyMove.x * moveSpeed);
        }

        const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.8, 1, 0.8));
        for(let w of walls) { if(pBox.intersectsBox(w)) camera.position.copy(oldPos); }

        document.getElementById('posX').innerText = Math.round(camera.position.x);
        document.getElementById('posZ').innerText = Math.round(camera.position.z);

        // Монстр
        const toP = new THREE.Vector3().subVectors(camera.position, monster.position).normalize();
        let mMove = toP.clone();
        const mRay = new THREE.Raycaster(monster.position, toP);
        const hit = mRay.intersectObjects(scene.children);
        if (hit.length > 0 && hit[0].object !== monster && hit[0].distance < 4.5) mMove.set(-toP.z, 0, toP.x);
        
        monster.position.addScaledVector(mMove, 0.15);
        monster.lookAt(camera.position.x, 1.5, camera.position.z);

        // Підбір зброї
        if (!hasGun && camera.position.distanceTo(shotgunItem.position) < 2.5) {
            hasGun = true; scene.remove(shotgunItem); gunMesh.visible = true;
            document.getElementById('crosshair').style.display = 'block';
            if(isTP) document.getElementById('fire-btn').style.display = 'flex';
        }

        const d = camera.position.distanceTo(monster.position);
        document.getElementById('dist').innerText = Math.round(d);
        if (d < 2.2) {
            isDead = true; playFartSound();
            document.getElementById('jumpscare').style.display = 'flex';
            setTimeout(() => { window.location.href = "https://scratch.mit.edu/projects/1297008347/"; }, 2000);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
