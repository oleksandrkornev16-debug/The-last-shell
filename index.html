<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The LAST Shell - MOBILE PRO</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        
        #menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #050505; color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            border: 4px solid #400; box-sizing: border-box;
        }
        
        .btn { 
            background: #600; border: 2px solid #f00; color: white; 
            padding: 15px 60px; cursor: pointer; font-size: 25px; 
            font-weight: bold; transition: 0.2s; margin: 15px;
            pointer-events: auto; text-transform: uppercase;
        }
        .btn:hover { background: #f00; box-shadow: 0 0 30px #f00; }
        
        .mobile-toggle { color: #aaa; font-size: 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .mobile-toggle input { width: 22px; height: 22px; }

        #ui { position: absolute; top: 10px; left: 10px; color: #f00; font-size: 12px; z-index: 10; display: none; background: rgba(0,0,0,0.7); padding: 8px; border: 1px solid #444; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid lime; transform: translate(-50%, -50%); display: none; z-index: 10; border-radius: 50%; }
        #jumpscare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 2000; justify-content: center; align-items: center; font-size: 150px; }

        /* Джойстик як у PUBG */
        #joystick-zone { 
            position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; 
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,0,0,0.2); 
            border-radius: 50%; display: none; z-index: 50;
        }
        #joystick-stick { 
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; 
            background: rgba(255,0,0,0.4); border-radius: 50%; 
            transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        
        /* Кнопка вогню */
        #fire-btn { 
            position: absolute; bottom: 40px; right: 60px; width: 120px; height: 120px; 
            background: rgba(255,0,0,0.5); border: 4px solid rgba(255,255,255,0.8); 
            border-radius: 50%; display: none; z-index: 60; color: white; 
            font-weight: bold; align-items: center; justify-content: center; 
            font-size: 22px; cursor: pointer; text-shadow: 0 2px 5px #000;
        }
    </style>
</head>
<body>

<div id="ui">
    X: <span id="posX">0</span> | Z: <span id="posZ">0</span> | <span id="dist">--</span>м<br>
    <span style="color:gold;">ЦІЛЬ: ЗОЛОТИЙ СТВОЛ (45, 45)</span>
</div>
<div id="crosshair"></div>

<div id="menu">
    <h1 style="color: red; font-size: 40px; text-shadow: 0 0 15px red; margin-bottom: 10px;">The LAST Shell</h1>
    <label class="mobile-toggle">
        <input type="checkbox" id="tpCheck" checked> ТЕЛЕФОННИЙ РЕЖИМ (ТР)
    </label>
    <button class="btn" id="startBtn">START GAME</button>
</div>

<div id="joystick-zone"><div id="joystick-stick"></div></div>
<div id="fire-btn">FIRE</div>
<div id="jumpscare">💀</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, monster, shotgunItem, gunMesh, walls = [];
    let isStarted = false, hasGun = false, isDead = false, isTP = false;
    const keys = {};

    let joyTouchId = null, lookTouchId = null;
    let joyStart = {x:0, y:0}, joyMove = {x:0, y:0}, lastLook = {x:0, y:0};

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 22);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.1, 0); 
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.SpotLight(0xffffff, 800, 45, Math.PI/6, 0.3, 1);
        const target = new THREE.Object3D();
        target.position.set(0, 0, -5);
        camera.add(target); camera.add(light);
        light.target = target; scene.add(camera);
        scene.add(new THREE.AmbientLight(0x050505));

        // Світ
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        for (let x = -30; x < 30; x++) {
            for (let z = -30; z < 30; z++) {
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(5,5), new THREE.MeshStandardMaterial({color:0x050505}));
                floor.rotation.x = -Math.PI/2; floor.position.set(x*5,0,z*5); scene.add(floor);
                if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
                if (Math.random() > 0.7) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(5, 12, 5), wallMat);
                    w.position.set(x*5, 6, z*5); scene.add(w);
                    walls.push(new THREE.Box3().setFromObject(w));
                }
            }
        }

        shotgunItem = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xffd700}));
        shotgunItem.position.set(45, 0.5, 45); scene.add(shotgunItem);

        gunMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8), new THREE.MeshStandardMaterial({color:0x222222}));
        gunMesh.rotation.x = Math.PI/2; gunMesh.position.set(0.35, -0.4, -0.6);
        camera.add(gunMesh); gunMesh.visible = false;

        monster = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 2, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xaa0000, emissiveIntensity: 2 }));
        monster.position.set(-110, 1.5, -110); scene.add(monster);

        // Керування
        const handleDown = (x, y, id) => {
            if(!isStarted || isDead) return;
            if(x < window.innerWidth / 2 && joyTouchId === null) {
                joyTouchId = id; joyStart = {x, y};
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('joystick-zone').style.left = (x - 65) + 'px';
                document.getElementById('joystick-zone').style.top = (y - 65) + 'px';
            } else if (x >= window.innerWidth / 2 && lookTouchId === null) {
                lookTouchId = id; lastLook = {x, y};
            }
        };

        const handleMove = (x, y, id) => {
            if(id === joyTouchId) {
                let dx = x - joyStart.x, dy = y - joyStart.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 50) { dx *= 50/dist; dy *= 50/dist; }
                document.getElementById('joystick-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joyMove = {x: dx/50, y: dy/50};
            }
            if(id === lookTouchId) {
                camera.rotation.y -= (x - lastLook.x) * 0.006;
                camera.rotation.x -= (y - lastLook.y) * 0.006;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
                lastLook = {x, y};
            }
        };

        window.addEventListener('touchstart', (e) => { for(let t of e.changedTouches) handleDown(t.clientX, t.clientY, t.identifier); });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); for(let t of e.touches) handleMove(t.clientX, t.clientY, t.identifier); }, {passive: false});
        window.addEventListener('touchend', (e) => { for(let t of e.changedTouches) { 
            if(t.identifier === joyTouchId) { joyTouchId = null; joyMove = {x:0, y:0}; document.getElementById('joystick-zone').style.display = 'none'; }
            if(t.identifier === lookTouchId) lookTouchId = null;
        }});

        // Стрільба
        const shoot = () => {
            if (!hasGun || isDead) return;
            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            ray.set(camera.position, dir);
            if (ray.intersectObject(monster).length > 0) { isDead = true; window.location.href = "https://scratch.mit.edu/projects/1297429937/"; }
        };
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); shoot(); });
    }

    // СТАРТ ТА ПОВНИЙ ЕКРАН
    async function startGame() {
        isTP = document.getElementById('tpCheck').checked;
        
        try {
            // Повний екран
            const doc = document.documentElement;
            if (doc.requestFullscreen) await doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) await doc.webkitRequestFullscreen();

            // Поворот екрана (Landscape)
            if (screen.orientation && screen.orientation.lock) {
                await screen.orientation.lock('landscape').catch(e => console.log("Orientation lock ignored"));
            }
        } catch (e) { console.log("UI change ignored"); }

        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        init();
        isStarted = true;
        animate();
    }

    document.getElementById('startBtn').addEventListener('click', startGame);

    function animate() {
        if (isDead) return;
        requestAnimationFrame(animate);

        const moveSpeed = 0.2;
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
        const side = new THREE.Vector3(-dir.z, 0, dir.x);
        const oldPos = camera.position.clone();

        if (joyTouchId !== null) {
            camera.position.addScaledVector(dir, -joyMove.y * moveSpeed);
            camera.position.addScaledVector(side, joyMove.x * moveSpeed);
        }

        const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.8, 1, 0.8));
        for(let w of walls) { if(pBox.intersectsBox(w)) camera.position.copy(oldPos); }

        document.getElementById('posX').innerText = Math.round(camera.position.x);
        document.getElementById('posZ').innerText = Math.round(camera.position.z);

        monster.position.addScaledVector(new THREE.Vector3().subVectors(camera.position, monster.position).normalize(), 0.16);
        monster.lookAt(camera.position.x, 1.5, camera.position.z);

        if (!hasGun && camera.position.distanceTo(shotgunItem.position) < 2.5) {
            hasGun = true; scene.remove(shotgunItem); gunMesh.visible = true;
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('fire-btn').style.display = 'flex';
        }

        if (camera.position.distanceTo(monster.position) < 2.2) {
            isDead = true; document.getElementById('jumpscare').style.display = 'flex';
            setTimeout(() => { window.location.href = "https://scratch.mit.edu/projects/1297008347/"; }, 2000);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
